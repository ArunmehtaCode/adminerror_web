<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpAdmin Pro - Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body">
    <div class="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon">C</span>
            <h2>CorpAdmin Pro</h2>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="users.html">User Management</a></li>
                <li class="active"><a href="settings.html">System Settings</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar">A</div>
                <span>Administrator</span>
            </div>
            <a href="#" id="logoutBtn" class="logout-link">Logout</a>
        </div>
    </div>
    
    <main class="main-content">
        <header class="topbar">
            <h1>System Settings & Diagnostics</h1>
            <div class="topbar-actions">
                <button class="btn-secondary" id="runDiagnostics">Run Diagnostics</button>
            </div>
        </header>
        
        <div class="settings-content">
            <div class="settings-grid">
                <!-- Vulnerability 7: Outdated Dependencies -->
                <div class="card sys-info-card">
                    <div class="card-header">
                        <h3>System Information</h3>
                        <span class="badge warning">Updates Available</span>
                    </div>
                    <div class="card-body" id="systemInfo">
                        <p class="loading">Loading system components...</p>
                    </div>
                </div>

                <!-- Vulnerability 6: Verbose Errors -->
                <div class="card error-logs-card">
                    <div class="card-header">
                        <h3>Diagnostic Logs</h3>
                        <button class="btn-outline-danger" id="triggerErrorBtn">Fetch Latest Logs</button>
                    </div>
                    <div class="card-body">
                        <pre id="errorDisplay" class="terminalViewer">No errors detected.</pre>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
</body>
</html>
